<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inloggen — Jottem</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body data-root=".." data-role="gebruiker">
<div class="context">
  <span class="pill role">Gebruiker</span>
  <span class="crumb"><a href="../index.html">Rondleiding</a> › <b>Inloggen</b></span>
</div>
<div class="wrap">
  <div style="max-width:420px;margin:0 auto">
    <div class="card"><div class="pad">
      <h2>Inloggen</h2>
      <form data-demo="Ingelogd (demo)">
        <div class="field"><label>E-mailadres</label><input type="email" required></div>
        <div class="field"><label>Wachtwoord</label><input type="password" required></div>
        <button class="btn block" type="submit">Inloggen</button>
      </form>
      <div class="center mt"><small>of log in met</small></div>
      <div class="btn-row mt" style="flex-direction:column">
        <button class="btn secondary block" data-demo="Social login via Google (demo)">Doorgaan met Google</button>
        <button class="btn secondary block" data-demo="Social login via Facebook (demo)">Doorgaan met Facebook</button>
      </div>
      <p class="center mt"><small>Nog geen account? <a href="../public/registreren.html">Registreren</a></small></p>
    </div></div>
  </div>
</div>
<script src="../assets/app.js"></script>
</body>
</html>
