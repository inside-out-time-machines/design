<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registreren — Jottem</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body data-root=".." data-role="bezoeker">
<div class="context">
  <span class="pill role">Bezoeker</span>
  <span class="crumb"><a href="../index.html">Rondleiding</a> › <b>Registreren</b></span>
</div>
<div class="wrap">
  <div style="max-width:440px;margin:0 auto">
    <div class="card"><div class="pad">
      <h2>Word deelnemer</h2>
      <p class="muted">Maak een account om materiaal te uploaden, te annoteren en favorieten te bewaren.</p>
      <form data-demo="Account aangemaakt — check je e-mail voor de bevestiging">
        <div class="field"><label>Naam</label><input type="text" required></div>
        <div class="field"><label>E-mailadres</label><input type="email" required></div>
        <div class="field"><label>Wachtwoord</label><input type="password" required></div>
        <div class="checkrow"><input type="checkbox" id="akk" required>
          <label for="akk" style="margin:0;font-weight:400">Ik ga akkoord met de <a href="info.html">spelregels, privacy en auteursrecht</a>.</label></div>
        <button class="btn block mt" type="submit">Account aanmaken</button>
      </form>
      <div class="center mt"><small>of</small></div>
      <div class="btn-row mt" style="flex-direction:column">
        <button class="btn secondary block" data-demo="Inloggen via Google (demo)">Doorgaan met Google</button>
        <button class="btn secondary block" data-demo="Inloggen via Microsoft (demo)">Doorgaan met Microsoft</button>
      </div>
      <p class="center mt"><small>Al een account? <a href="../account/inloggen.html">Inloggen</a></small></p>
    </div></div>
  </div>
</div>
<script src="../assets/app.js"></script>
</body>
</html>
