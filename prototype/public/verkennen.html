<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Verkennen — Smaak van Gouda</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body data-root=".." data-role="bezoeker">
<div class="context">
  <span class="pill role">Bezoeker</span>
  <span class="crumb"><a href="../index.html">Rondleiding</a> › <b>Jottems doorzoeken</b></span>
</div>
<div class="wrap">

  <div class="section-title"><h2>Verken de collectie</h2><span class="muted" id="count"></span></div>

  <div class="card mb"><div class="pad">
    <div class="field" style="margin:0 0 12px">
      <input type="search" id="q" placeholder="Zoek op naam, adres of trefwoord… (bijv. 'Markt', 'Chinees', 'shoarma')">
    </div>
    <div class="wrap-gap">
      <strong style="font-size:.85rem">Materiaaltype:</strong>
      <div class="chips" data-single>
        <span class="chip active">Alles</span>
        <span class="chip">foto</span>
        <span class="chip">menukaart</span>
        <span class="chip">advertentie</span>
        <span class="chip">krantenartikel</span>
        <span class="chip">vergunning</span>
      </div>
    </div>
    <div class="wrap-gap mt">
      <strong style="font-size:.85rem">Periode:</strong>
      <div class="chips" data-single>
        <span class="chip active">Alle jaren</span>
        <span class="chip">‹ 1960</span>
        <span class="chip">1960–1980</span>
        <span class="chip">1980–2000</span>
        <span class="chip">2000 ›</span>
      </div>
    </div>
  </div></div>

  <div class="grid cols-4" id="results"></div>
</div>
<script src="../assets/app.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    renderThumbs("#results", JOTTEM.JOTTEMS, "jottem.html");
    document.getElementById("count").textContent = JOTTEM.JOTTEMS.length + " resultaten";
    // demo: zoeken filtert visueel niet hard, maar geeft feedback
    document.getElementById("q").addEventListener("keydown", function (e) {
      if (e.key === "Enter") toast("Zoeken op “" + (this.value || "alles") + "” (demo)");
    });
  });
</script>
</body>
</html>
